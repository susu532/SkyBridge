<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SkyBridge</title>
    <meta name="robots" content="noarchive, nosnippet, noimageindex" />
    <meta http-equiv="X-Frame-Options" content="DENY" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Pixelify+Sans:wght@400..700&display=swap" rel="stylesheet">
    <style>
      /* Anti-selection CSS layer */
      body { -webkit-user-select: none; -moz-user-select: none; -ms-user-select: none; user-select: none; }
      input, textarea { -webkit-user-select: text; -moz-user-select: text; -ms-user-select: text; user-select: text; }
    </style>
  </head>
  <body>
    <!-- Protection shield - loads before app -->
    <script>
      !function(){if(!window.location.hostname.includes("localhost")&&!window.location.hostname.includes("127.0.0.1")){var e=function(){var e=new Date;debugger;if(new Date-e>100)document.documentElement.innerHTML="Debug detected"};setInterval(e,1e3)}}();
    </script>
    <script src="/shield.js"></script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
